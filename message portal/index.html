<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Message Portal</title>

<!-- Cinzel font -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Cinzel', serif;
}

/* BACKGROUND */
body {
    height: 100vh;
    overflow: hidden;
    background: url("/attachments/PKys3C2qAdCrq4evJjEaY.png") center/cover no-repeat;
    position: relative;
}

/* DARK CINEMATIC OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1;
    pointer-events: none;
}

/* LOGIN */
#login {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.logo {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin-bottom: 25px;
    box-shadow: 0 0 40px rgba(255,215,0,0.7);
}

h1 {
    color: #FFD700;
    margin-bottom: 20px;
    letter-spacing: 4px;
    font-weight: 600;
    text-transform: uppercase;
    text-shadow: 0 0 15px rgba(255,215,0,0.6);
}

input {
    padding: 12px;
    width: 280px;
    text-align: center;
    border: 1px solid #FFD700;
    background: rgba(0,0,0,0.45);
    color: #FFD700;
    outline: none;
    border-radius: 8px;
    font-family: 'Cinzel', serif;
}

input::placeholder {
    color: rgba(255,215,0,0.5);
}

button {
    margin-top: 18px;
    padding: 12px 30px;
    border: 1px solid #FFD700;
    background: transparent;
    color: #FFD700;
    cursor: pointer;
    transition: 0.3s;
    border-radius: 8px;
    font-family: 'Cinzel', serif;
}

button:hover {
    transform: scale(1.07);
    box-shadow: 0 0 25px rgba(255,215,0,0.6);
}

/* CHAT */
#chat {
    display: none;
    height: 100vh;
    flex-direction: column;
    position: relative;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.4s ease;
}

/* TOP BAR */
.topbar {
    display: flex;
    align-items: center;
    padding: 12px;
    background: rgba(0,0,0,0.85);
    border-bottom: 1px solid rgba(255,215,0,0.35);
    backdrop-filter: blur(12px);
}

.topbar img {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    margin-right: 12px;
    box-shadow: 0 0 15px rgba(255,215,0,0.6);
}

.title {
    color: #FFD700;
    font-weight: 600;
    font-size: 1.1rem;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(255,215,0,0.5);
}

/* MESSAGES */
#messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.msg {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 16px;
    border: 1px solid rgba(255,215,0,0.35);
    color: #FFD700;
    background: rgba(0,0,0,0.55);
    animation: fade 0.3s ease;
    text-shadow: 0 0 8px rgba(255,215,0,0.4);
    font-family: 'Cinzel', serif;
}

.me {
    align-self: flex-end;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #111;
    font-weight: 500;
    box-shadow: 0 0 15px rgba(255,215,0,0.6);
}

/* INPUT BAR */
.inputbar {
    display: flex;
    gap: 12px;
    padding: 12px;
    background: rgba(0,0,0,0.85);
    border-top: 1px solid rgba(255,215,0,0.35);
}

.inputbar input {
    flex: 1;
    border-radius: 20px;
    text-align: left;
    padding-left: 15px;
    border: 1px solid #FFD700;
    background: rgba(0,0,0,0.45);
    color: #FFD700;
    font-family: 'Cinzel', serif;
}

.inputbar input::placeholder {
    color: rgba(255,215,0,0.5);
}

.inputbar button {
    border-radius: 20px;
    font-family: 'Cinzel', serif;
}

/* ANIMATION */
@keyframes fade {
    from {opacity: 0; transform: translateY(5px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- LOGIN -->
<div id="login">
    <img src="logo.png" class="logo"/>
    <h1>MESSAGE PORTAL 🌙</h1>

    <input id="pass" placeholder="Enter Access Key"/>
    <button onclick="enter()">ACCESS</button>
</div>

<!-- CHAT -->
<div id="chat">

    <div class="topbar">
        <img src="logo.png"/>
        <div class="title">Message Portal 🌙</div>
    </div>

    <div id="messages"></div>

    <div class="inputbar">
        <input id="msg" placeholder="Type message..."/>
        <button onclick="send()">Send</button>
    </div>

</div>

<script>
const PASSWORD = "goldmoon";

/* LOGIN */
function enter() {
    const val = document.getElementById("pass").value;
    if (val === PASSWORD) {
        document.getElementById("login").style.display = "none";
        const chat = document.getElementById("chat");
        chat.style.display = "flex";
        setTimeout(() => chat.style.opacity = "1", 50);
    } else {
        alert("Incorrect key");
    }
}

/* SEND MESSAGE */
function send() {
    const input = document.getElementById("msg");
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, true);
    input.value = "";
}

/* DISPLAY */
function addMsg(text, mine = false) {
    const div = document.createElement("div");
    div.className = mine ? "msg me" : "msg";
    div.innerText = text;
    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
}
</script>

</body>
</html>
